<!DOCTYPE html>
<html lang="en">
<head>
<link rel="stylesheet" href="/estacionamento/css/bootstrap.min.css">

    <!-- <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> -->
    <title> Estacionamento JS </title>
</head>
<body onload="mostraPatio()">
    <div class="container">
        <div class="header clearFix">
            <h2>Estacionamento JS </h2>
            <br id="assinatura">por: Marcelo Minuzzi</br> 
        <div class="jumbotron">

            <form id="formulario">
            
            <div class="form-group">
                <label>Modelo do veículo: </label>
                <input type="text" id="modeloCarro" class="form-control">
            </div>

            <div class="form-group">
                <label>Placa do Veículo: </label>
                <input type="text" id="placaCarro" class="form-control">
             </div>

             <button type="submit" class="btn btn-primary">Adicionar</button>        

            </form>
        </div>

        </div>

        <div class="row marketing">
            
            <div class="col-lg-12">
                
                <table class="table table-hover">
                    
                    <thead>
                        <tr>
                            <th>Modelo</th>
                            <th>Placa</th>
                            <th>Entrada</th>
                            <th>Finalizar</th>
                        </tr>
                    </thead>

                    <tbody id="resultados"></tbody>

                </table>

            </div>

        </div>

    </div>

    <script src="/estacionamento/js/jquery.js"></script>
    <script src="/estacionamento/js/bootstrap.min.js"></script>
    <script src="/estacionamento/js/main.js"></script>
